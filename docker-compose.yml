services:
  mongodb:
    image: mongo:7
    container_name: authservice_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: authservice
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"   # optional: nur für lokalen Zugriff/Debugging

  authservice:
    build: .
    container_name: authservice
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: authservice
    volumes:
      - ./keys:/app/keys

volumes:
  mongo_data:
